<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="100%">
  <style>
    @keyframes walk  { from { transform: translateX(-150px); } to { transform: translateX(870px); } }
    @keyframes bob   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    @keyframes legL  { 0%,100% { transform: rotate(32deg);  } 50% { transform: rotate(-32deg); } }
    @keyframes legR  { 0%,100% { transform: rotate(-32deg); } 50% { transform: rotate(32deg);  } }
    @keyframes armL  { 0%,100% { transform: rotate(-32deg); } 50% { transform: rotate(32deg);  } }
    @keyframes armR  { 0%,100% { transform: rotate(32deg);  } 50% { transform: rotate(-32deg); } }
    @keyframes blink { 0%,92%,100% { transform: scaleY(1); } 96% { transform: scaleY(0.08); } }

    .walk  { animation: walk  5s linear infinite; }
    .bob   { animation: bob   0.5s ease-in-out infinite; }
    .leg-l { transform-box: fill-box; transform-origin: top center; animation: legL 0.5s ease-in-out infinite; }
    .leg-r { transform-box: fill-box; transform-origin: top center; animation: legR 0.5s ease-in-out infinite; }
    .arm-l { transform-box: fill-box; transform-origin: top right;  animation: armL 0.5s ease-in-out infinite; }
    .arm-r { transform-box: fill-box; transform-origin: top left;   animation: armR 0.5s ease-in-out infinite; }
    .eye   { transform-box: fill-box; transform-origin: center;     animation: blink 4s ease-in-out infinite; }
  </style>

  <!-- ground strip -->
  <rect x="0" y="148" width="800" height="12" fill="#0D1117"/>
  <line x1="0" y1="148" x2="800" y2="148" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.6"/>

  <g class="walk">
    <g class="bob">

      <!-- shadow -->
      <ellipse cx="61" cy="149" rx="24" ry="4" fill="#00000025"/>

      <!-- LEGS (drawn before body so body covers the hip) -->
      <g class="leg-l">
        <rect x="47" y="106" width="12" height="38" fill="#2C3A6E" rx="4"/>
        <rect x="43" y="138" width="20" height="10" fill="#1A1A2E" rx="3"/>
      </g>
      <g class="leg-r">
        <rect x="63" y="106" width="12" height="38" fill="#2C3A6E" rx="4"/>
        <rect x="59" y="138" width="20" height="10" fill="#1A1A2E" rx="3"/>
      </g>

      <!-- ARMS (drawn before body so body covers shoulder) -->
      <g class="arm-l">
        <rect x="20" y="64" width="12" height="38" fill="#A78BFA" rx="5"/>
        <ellipse cx="26" cy="104" rx="7" ry="9" fill="#FFD5B8"/>
      </g>
      <g class="arm-r">
        <rect x="90" y="64" width="12" height="38" fill="#A78BFA" rx="5"/>
        <ellipse cx="96" cy="104" rx="7" ry="9" fill="#FFD5B8"/>
      </g>

      <!-- BODY -->
      <rect x="32" y="60" width="58" height="50" fill="#A78BFA" rx="8"/>
      <!-- collar -->
      <polygon points="55,60 67,60 71,78 51,78" fill="#8B5CF6"/>
      <!-- belt -->
      <rect x="32" y="105" width="58" height="8" fill="#1E2A55"/>
      <rect x="53" y="106" width="16" height="6" fill="#A78BFA" rx="2"/>

      <!-- NECK -->
      <rect x="52" y="50" width="18" height="14" fill="#FFD5B8"/>

      <!-- HAIR back -->
      <rect x="34" y="12" width="54" height="16" fill="#2E1A0E" rx="6"/>

      <!-- FACE -->
      <rect x="34" y="18" width="54" height="40" fill="#FFD5B8" rx="10"/>

      <!-- HAIR top + sides -->
      <rect x="36" y="8"  width="50" height="17" fill="#2E1A0E" rx="7"/>
      <rect x="34" y="14" width="10" height="20" fill="#2E1A0E" rx="4"/>
      <rect x="78" y="14" width="10" height="20" fill="#2E1A0E" rx="4"/>

      <!-- EYES -->
      <g class="eye"><ellipse cx="51" cy="32" rx="5.5" ry="6.5" fill="#1A1A2E"/></g>
      <g class="eye"><ellipse cx="71" cy="32" rx="5.5" ry="6.5" fill="#1A1A2E"/></g>
      <!-- eye shine -->
      <ellipse cx="49" cy="30" rx="2" ry="2" fill="white"/>
      <ellipse cx="69" cy="30" rx="2" ry="2" fill="white"/>

      <!-- BLUSH -->
      <ellipse cx="42" cy="41" rx="6" ry="3.5" fill="#FFB3A0" opacity="0.55"/>
      <ellipse cx="80" cy="41" rx="6" ry="3.5" fill="#FFB3A0" opacity="0.55"/>

      <!-- SMILE -->
      <path d="M49 50 Q61 60 73 50" stroke="#C0392B" stroke-width="3" fill="none" stroke-linecap="round"/>

    </g>
  </g>
</svg>
