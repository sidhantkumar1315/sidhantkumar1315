<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }
      @keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
      .cursor { animation: blink 1.1s step-end infinite; }
    </style>
  </defs>

  <!-- window body -->
  <rect width="800" height="250" fill="#0A0A0A" rx="10"/>

  <!-- title bar -->
  <rect x="0" y="0" width="800" height="38" fill="#1C1C1C" rx="10"/>
  <rect x="0" y="22" width="800" height="16" fill="#1C1C1C"/>

  <!-- traffic lights -->
  <circle cx="24" cy="19" r="7" fill="#FF5F57"/>
  <circle cx="48" cy="19" r="7" fill="#FEBC2E"/>
  <circle cx="72" cy="19" r="7" fill="#28C840"/>

  <!-- title bar label -->
  <text x="400" y="24" text-anchor="middle" class="mono" font-size="12" fill="#666666">sidhant@dalhousie: ~ — bash</text>

  <!-- ── line 1 ── -->
  <text x="20" y="72" class="mono" font-size="14" fill="#00FF41">sidhant@dalhousie</text>
  <text x="176" y="72" class="mono" font-size="14" fill="#666">:</text>
  <text x="184" y="72" class="mono" font-size="14" fill="#6699FF">~</text>
  <text x="198" y="72" class="mono" font-size="14" fill="#FFFFFF">$ whoami</text>

  <text x="20" y="94" class="mono" font-size="14" fill="#CCCCCC">Sidhant Kumar — 4th-year CS @ Dalhousie | Builder | Open to Fall 2026 Co-op</text>

  <!-- ── line 2 ── -->
  <text x="20" y="122" class="mono" font-size="14" fill="#00FF41">sidhant@dalhousie</text>
  <text x="176" y="122" class="mono" font-size="14" fill="#666">:</text>
  <text x="184" y="122" class="mono" font-size="14" fill="#6699FF">~</text>
  <text x="198" y="122" class="mono" font-size="14" fill="#FFFFFF">$ ls projects/</text>

  <text x="20" y="144" class="mono" font-size="14" fill="#61DAFB">PeerSync/</text>
  <text x="130" y="144" class="mono" font-size="14" fill="#61DAFB">VoicetoSQL/</text>
  <text x="278" y="144" class="mono" font-size="14" fill="#61DAFB">Groki/</text>

  <!-- ── line 3 ── -->
  <text x="20" y="172" class="mono" font-size="14" fill="#00FF41">sidhant@dalhousie</text>
  <text x="176" y="172" class="mono" font-size="14" fill="#666">:</text>
  <text x="184" y="172" class="mono" font-size="14" fill="#6699FF">~</text>
  <text x="198" y="172" class="mono" font-size="14" fill="#FFFFFF">$ cat skills.txt</text>

  <text x="20" y="194" class="mono" font-size="14" fill="#CCCCCC">TypeScript · React · Node.js · Python · AWS · Docker · OpenAI · Claude</text>

  <!-- ── line 4: idle prompt + blinking cursor ── -->
  <text x="20" y="230" class="mono" font-size="14" fill="#00FF41">sidhant@dalhousie</text>
  <text x="176" y="230" class="mono" font-size="14" fill="#666">:</text>
  <text x="184" y="230" class="mono" font-size="14" fill="#6699FF">~</text>
  <text x="198" y="230" class="mono" font-size="14" fill="#FFFFFF">$&#160;</text>
  <rect x="216" y="216" width="9" height="17" fill="#00FF41" class="cursor"/>
</svg>
