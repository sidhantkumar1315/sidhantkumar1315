<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }
      @keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
      .cursor { animation: blink 1.1s step-end infinite; }
    </style>
  </defs>

  <!-- window border / glow -->
  <rect width="800" height="250" fill="#33AA44" rx="10"/>

  <!-- window body — light green -->
  <rect x="2" y="2" width="796" height="246" fill="#C8FFB8" rx="9"/>

  <!-- title bar -->
  <rect x="2" y="2" width="796" height="38" fill="#2E7D32" rx="9"/>
  <rect x="2" y="28" width="796" height="12" fill="#2E7D32"/>

  <!-- traffic lights -->
  <circle cx="24" cy="21" r="7" fill="#FF5F57"/>
  <circle cx="48" cy="21" r="7" fill="#FEBC2E"/>
  <circle cx="72" cy="21" r="7" fill="#28C840"/>

  <!-- title bar label -->
  <text x="400" y="26" text-anchor="middle" class="mono" font-size="12" fill="#A5D6A7">sidhant@dalhousie: ~ — bash</text>

  <!-- ── line 1 ── -->
  <text x="20" y="74" class="mono" font-size="14" fill="#1B5E20">sidhant@dalhousie</text>
  <text x="176" y="74" class="mono" font-size="14" fill="#388E3C">:</text>
  <text x="184" y="74" class="mono" font-size="14" fill="#2E7D32">~</text>
  <text x="198" y="74" class="mono" font-size="14" fill="#000000">$ whoami</text>

  <text x="20" y="96" class="mono" font-size="14" fill="#1A1A1A">Sidhant Kumar — 4th-year CS @ Dalhousie | Builder | Open to Fall 2026 Co-op</text>

  <!-- ── line 2 ── -->
  <text x="20" y="124" class="mono" font-size="14" fill="#1B5E20">sidhant@dalhousie</text>
  <text x="176" y="124" class="mono" font-size="14" fill="#388E3C">:</text>
  <text x="184" y="124" class="mono" font-size="14" fill="#2E7D32">~</text>
  <text x="198" y="124" class="mono" font-size="14" fill="#000000">$ ls projects/</text>

  <text x="20"  y="146" class="mono" font-size="14" fill="#004D99">PeerSync/</text>
  <text x="130" y="146" class="mono" font-size="14" fill="#004D99">VoicetoSQL/</text>
  <text x="278" y="146" class="mono" font-size="14" fill="#004D99">Groki/</text>

  <!-- ── line 3 ── -->
  <text x="20" y="174" class="mono" font-size="14" fill="#1B5E20">sidhant@dalhousie</text>
  <text x="176" y="174" class="mono" font-size="14" fill="#388E3C">:</text>
  <text x="184" y="174" class="mono" font-size="14" fill="#2E7D32">~</text>
  <text x="198" y="174" class="mono" font-size="14" fill="#000000">$ cat skills.txt</text>

  <text x="20" y="196" class="mono" font-size="14" fill="#1A1A1A">TypeScript · React · Node.js · Python · AWS · Docker · OpenAI · Claude</text>

  <!-- ── idle prompt + blinking cursor ── -->
  <text x="20" y="232" class="mono" font-size="14" fill="#1B5E20">sidhant@dalhousie</text>
  <text x="176" y="232" class="mono" font-size="14" fill="#388E3C">:</text>
  <text x="184" y="232" class="mono" font-size="14" fill="#2E7D32">~</text>
  <text x="198" y="232" class="mono" font-size="14" fill="#000000">$&#160;</text>
  <rect x="216" y="218" width="9" height="17" fill="#1B5E20" class="cursor"/>
</svg>
